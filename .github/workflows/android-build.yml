name: Android Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Verify debug APK exists
        run: |
          test -f app/build/outputs/apk/debug/app-debug.apk
          ls -lh app/build/outputs/apk/debug/app-debug.apk

      - name: Run tests
        run: ./gradlew test

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: markleaf-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore release keystore
        env:
          MARKLEAF_RELEASE_KEYSTORE_BASE64: ${{ secrets.MARKLEAF_RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p release
          printf '%s' "$MARKLEAF_RELEASE_KEYSTORE_BASE64" | base64 -d > release/markleaf-release.p12

      - name: Run tests
        run: ./gradlew test

      - name: Build signed release APK
        env:
          MARKLEAF_RELEASE_STORE_FILE: release/markleaf-release.p12
          MARKLEAF_RELEASE_STORE_PASSWORD: ${{ secrets.MARKLEAF_RELEASE_STORE_PASSWORD }}
          MARKLEAF_RELEASE_KEY_ALIAS: ${{ secrets.MARKLEAF_RELEASE_KEY_ALIAS }}
          MARKLEAF_RELEASE_KEY_PASSWORD: ${{ secrets.MARKLEAF_RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Prepare release asset
        run: |
          cp app/build/outputs/apk/release/app-release.apk "markleaf-${GITHUB_REF_NAME}.apk"
          test -s "markleaf-${GITHUB_REF_NAME}.apk"
          ls -lh "markleaf-${GITHUB_REF_NAME}.apk"

      - name: Prepare release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$VERSION" '
            BEGIN { heading = "## v" version }
            index($0, heading) == 1 && (length($0) == length(heading) || substr($0, length(heading) + 1, 1) == " " || substr($0, length(heading) + 1, 1) == "-") {
              sub(/^## /, "")
              sub(/ - [0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]$/, "")
              print
              exit
            }
          ' CHANGELOG.md > release-title.txt
          test -s release-title.txt
          awk -v version="$VERSION" '
            BEGIN { heading = "## v" version }
            index($0, heading) == 1 && (length($0) == length(heading) || substr($0, length(heading) + 1, 1) == " " || substr($0, length(heading) + 1, 1) == "-") { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
          cat release-title.txt
          cat release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "markleaf-${GITHUB_REF_NAME}.apk" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$(cat release-title.txt)" \
            --notes-file release-notes.md
